name: Auto OpenAI Registration

on:
  workflow_dispatch:
    inputs:
      run_count:
        description: '请输入本次需要注册的账号数量'
        required: true
        default: '5'
        type: string
  schedule:
    - cron: '0 0 * * 0'  # 0代表星期日。如果你想改在星期一，就写 '0 0 * * 1'

jobs:
  run-registration:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 授予 GitHub Actions 推送代码的权限
    env: # 新增这下面两行，强制启用 Node.js 24 来消除警告
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 使用稳定的 Python 版本

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Registration Script
        env:
          # 从 GitHub Secrets 中读取刚才保存的 PROXY_URL
          PROXY_URL: ${{ secrets.PROXY_URL }}
        # 如果 PROXY_URL 存在，则加上 --proxy 参数；否则按无代理运行
        run: |
          # 如果是手动触发，取输入的值；如果是定时任务触发，则默认跑 5 次
          COUNT="${{ github.event.inputs.run_count || '5' }}"
          echo "准备循环运行 $COUNT 次注册流程..."
          if [ -n "$PROXY_URL" ]; then
            # 传入 --count 参数
            python openai_register.py --count "$COUNT" --proxy "$PROXY_URL"
          else
            python openai_register.py --count "$COUNT"
          fi

      - name: Commit and Push generated JSON files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 将 Json 文件夹下的变更加入 Git
          git add Json/
          
          # 如果有新文件则提交，否则跳过
          git commit -m "Auto-add new generated token JSON" || echo "No new tokens generated"
          git push
